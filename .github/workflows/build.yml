name: Build APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.apk'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        run: |
          ANDROID_HOME="$HOME/android-sdk"
          mkdir -p "$ANDROID_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdtools.zip
            unzip -q /tmp/cmdtools.zip -d "$ANDROID_HOME/cmdline-tools"
            mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest" 2>/dev/null || true
          fi
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.4

      - name: Build with Gradle
        run: |
          echo "sdk.dir=$HOME/android-sdk" > app/local.properties
          gradle assembleDebug --no-daemon 2>&1

      - name: Upload APK to GitHub Release
        if: success()
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "Found APK, size: $(ls -lh app/build/outputs/apk/debug/app-debug.apk | awk '{print $5}')"
            # Use GitHub CLI to create a release with the APK
            if command -v gh; then
              gh release delete welder-exam -f --repo fbc299/welder-exam 2>/dev/null || true
              gh release create welder-exam --repo fbc299/welder-exam \
                --title "Welder Exam APK" \
                --notes "Auto-built APK from commit $GITHUB_SHA" \
                app/build/outputs/apk/debug/app-debug.apk
            else
              echo "gh not available, using git method"
              git config --global user.email "ci@welder-exam.github.com"
              git config --global user.name "CI Bot"
              cp app/build/outputs/apk/debug/app-debug.apk welder-exam.apk
              git add welder-exam.apk
              git commit -m "APK build artifact $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
              git push origin main
            fi
          else
            echo "ERROR: APK not found!"
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi
