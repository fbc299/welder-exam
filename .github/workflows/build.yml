name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Show environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $HOME/android-sdk 2>/dev/null || echo "SDK not found at $HOME/android-sdk"
          java -version 2>&1

      - name: Configure Gradle
        run: |
          echo "sdk.dir=$HOME/android-sdk" > local.properties
          cat local.properties
          mkdir -p ~/.gradle
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=false" >> ~/.gradle/gradle.properties

      - name: Build debug APK with retry
        run: |
          for i in 1 2 3; do
            echo "=== Attempt $i/3 ==="
            if ./gradlew assembleDebug --no-daemon --stacktrace 2>&1; then
              echo "BUILD SUCCESS on attempt $i"
              exit 0
            fi
            echo "BUILD FAILED, attempt $i/3"
            if [ $i -lt 3 ]; then
              echo "Waiting 30s before retry..."
              sleep 30
            fi
          done
          echo "ALL BUILD ATTEMPTS FAILED"
          exit 1

      - name: Check APK
        run: |
          echo "=== APK locations ==="
          find . -name "*.apk" -type f 2>/dev/null
          ls -la app/build/outputs/apk/debug/ 2>/dev/null && echo "APK FOUND!" || echo "APK NOT FOUND"
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Welder Exam APK v1.0
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
