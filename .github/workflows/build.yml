name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug Environment
        run: |
          echo "=== Java version ==="
          java -version 2>&1
          echo ""
          echo "=== JAVA_HOME ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo ""
          echo "=== Android SDK location ==="
          echo "HOME=$HOME"
          ls -la $HOME/android-sdk 2>/dev/null || echo "SDK NOT FOUND at $HOME/android-sdk"
          echo ""
          echo "=== ANDROID_HOME ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo ""
          echo "=== ANDROID_SDK_ROOT ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo ""
          echo "=== local.properties ==="
          echo "sdk.dir=$HOME/android-sdk" > local.properties
          cat local.properties
          echo ""
          echo "=== ls gradle/wrapper/ ==="
          ls -la gradle/wrapper/
          echo ""
          echo "=== Gradle version (wrapper) ==="
          ./gradlew --version 2>&1 || echo "Gradle FAILED"
          echo ""
          echo "=== Disk space ==="
          df -h .

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -100
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.debug=true"

      - name: Debug APK output
        if: always()
        run: |
          echo "=== app/build/outputs ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          echo ""
          echo "=== app/build/outputs/apk ==="
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
          echo ""
          echo "=== app/build/outputs/apk/debug ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug apk"
          echo ""
          echo "=== Find all APK files ==="
          find app/build -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload to GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Welder Exam APK v1.0
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
