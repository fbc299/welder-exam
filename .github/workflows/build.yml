name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Show environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $HOME/android-sdk 2>/dev/null || echo "SDK not found"
          java -version 2>&1

      - name: Configure Gradle
        run: |
          echo "sdk.dir=$HOME/android-sdk" > local.properties
          cat local.properties
          mkdir -p ~/.gradle
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=false" >> ~/.gradle/gradle.properties

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -100

      - name: Check APK
        run: |
          echo "=== APK locations ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "debug dir not found"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Welder Exam APK v1.0
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
