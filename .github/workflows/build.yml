name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        run: |
          ANDROID_HOME="$HOME/android-sdk"
          mkdir -p "$ANDROID_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdtools.zip
            unzip -q /tmp/cmdtools.zip -d "$ANDROID_HOME/cmdline-tools"
            mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest" 2>/dev/null || true
          fi
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3

      - name: Find Gradle
        id: find_gradle
        run: |
          echo "=== Checking for gradle in various locations ==="
          # Check PATH
          which gradle || echo "gradle not in PATH"
          # Check common locations
          find /opt /usr/local /home -name "gradle" -type f 2>/dev/null | head -10
          # Check gradle cache in setup-java
          ls ~/.gradle/ 2>/dev/null || echo "no .gradle dir"
          find ~/.gradle -name "gradle" -type f 2>/dev/null | head -5
          find ~/.gradle -name "gradle-*" -type d 2>/dev/null | head -5
          echo "=== Done ==="

      - name: Download Gradle 8.4 directly
        run: |
          echo "=== Downloading Gradle 8.4 ==="
          curl -sL https://services.gradle.org/distributions/gradle-8.4-bin.zip -o /tmp/gradle-8.4.zip
          echo "Downloaded, size: $(ls -la /tmp/gradle-8.4.zip | awk '{print $5}') bytes"
          unzip -q /tmp/gradle-8.4.zip -d /opt/
          echo "Unzipped"
          ls /opt/gradle-8.4/bin/
          /opt/gradle-8.4/bin/gradle --version

      - name: Build with Gradle
        run: |
          echo "sdk.dir=$HOME/android-sdk" > app/local.properties
          echo "=== Building APK ==="
          /opt/gradle-8.4/bin/gradle assembleDebug --no-daemon 2>&1
          BUILD_EXIT=$?
          echo "=== Build exit code: $BUILD_EXIT ==="
          echo "=== Looking for APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK dir not found"
          echo "=== Build complete ==="

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: welder-exam-debug
          path: app/build/outputs/apk/debug/app-debug.apk
