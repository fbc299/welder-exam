name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          echo "=== BUILD START ==="
          echo "PWD: $(pwd)"
          echo "HOME: $HOME"
          ls -la /home/runner/android-sdk 2>/dev/null || echo "SDK not at /home/runner/android-sdk"
          ls -la $HOME/android-sdk 2>/dev/null || echo "SDK not at $HOME/android-sdk"
          ls -la /opt/android-sdk 2>/dev/null || echo "SDK not at /opt/android-sdk"
          ANDROID_HOME="${HOME}/android-sdk"
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -80

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Welder Exam APK v1.0
          draft: true
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}
