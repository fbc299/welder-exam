name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        run: |
          ANDROID_HOME="$HOME/android-sdk"
          mkdir -p "$ANDROID_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdtools.zip
            unzip -q /tmp/cmdtools.zip -d "$ANDROID_HOME/cmdline-tools"
            mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest" 2>/dev/null || true
          fi
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3
          echo "SDK setup complete"

      - name: Find system Gradle
        id: find_gradle
        run: |
          GRADLE_PATH=$(find /opt -name "gradle" -type f 2>/dev/null | grep -v wrapper | head -1)
          echo "Found gradle at: $GRADLE_PATH"
          if [ -z "$GRADLE_PATH" ]; then
            echo "No system gradle"
            exit 1
          fi
          $GRADLE_PATH --version
          echo "gradle_path=$GRADLE_PATH" >> $GITHUB_OUTPUT

      - name: Generate Gradle wrapper
        run: |
          ${{ steps.find_gradle.outputs.gradle_path }} wrapper --gradle-version 8.4
          chmod +x gradlew
          ls -la gradlew gradle/wrapper/gradle-wrapper.jar
          file gradle/wrapper/gradle-wrapper.jar

      - name: Build with Gradle
        run: |
          echo "sdk.dir=$HOME/android-sdk" > app/local.properties
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -80

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: welder-exam-debug
          path: app/build/outputs/apk/debug/app-debug.apk
