name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          echo "sdk.dir=$HOME/android-sdk" > local.properties
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -50

      - name: Check APK
        run: |
          echo "=== APK ==="
          ls -la app/build/outputs/apk/debug/app-debug.apk 2>/dev/null || echo "NOT FOUND"
          find . -name "*.apk" -type f

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: welder-exam-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5

      - name: Create Release & Upload APK
        uses: ncibone/gh-release@main
        with:
          artifact_name: welder-exam-debug
          tag: v1.0
          name: Welder Exam APK v1.0
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
