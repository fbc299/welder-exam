name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        id: setup-android
        uses: android-actions/setup-android@v3

      - name: Show Android SDK path
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "SDK contents:"
          ls -la "$ANDROID_HOME" 2>/dev/null || ls -la "$ANDROID_SDK_ROOT" 2>/dev/null || echo "SDK not found"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ steps.setup-android.outputs.sdk-path }}
          ANDROID_SDK_ROOT: ${{ steps.setup-android.outputs.sdk-path }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Welder Exam APK v1.0
          draft: true
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}
