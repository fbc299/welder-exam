name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check environment
        run: |
          echo "=== Pre-installed tools ==="
          ls /opt/hostedtoolcache/ 2>/dev/null || echo "No hostedtoolcache"
          ls /usr/local/ 2>/dev/null
          which java && java -version 2>&1
          which gradle && gradle --version 2>&1 || echo "gradle not in PATH"
          ls /opt/gradle* 2>/dev/null || echo "no gradle in /opt"
          echo "=== HOME ==="
          echo $HOME
          ls $HOME 2>/dev/null

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        run: |
          ANDROID_HOME="$HOME/android-sdk"
          mkdir -p "$ANDROID_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdtools.zip
            unzip -q /tmp/cmdtools.zip -d "$ANDROID_HOME/cmdline-tools"
            mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest" 2>/dev/null || true
          fi
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3

      - name: Create local.properties
        run: echo "sdk.dir=$HOME/android-sdk" > app/local.properties

      - name: Build debug APK
        run: |
          if command -v /opt/gradle-8.4/bin/gradle 2>/dev/null; then
            /opt/gradle-8.4/bin/gradle assembleDebug --no-daemon 2>&1
          elif command -v gradle 2>/dev/null; then
            gradle assembleDebug --no-daemon 2>&1
          else
            echo "ERROR: Gradle not found"
            ls /opt/ 2>/dev/null
            exit 1
          fi

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: welder-exam-debug
          path: app/build/outputs/apk/debug/app-debug.apk
